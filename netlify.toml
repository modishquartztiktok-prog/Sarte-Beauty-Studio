[build]
  command = "npm install -g pnpm@9 && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/sarte-salon run build"
  publish = "artifacts/sarte-salon/dist/public"

[build.environment]
  NODE_VERSION = "20"
  BASE_PATH = "/"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
