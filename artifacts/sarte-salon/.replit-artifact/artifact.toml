kind = "web"
previewPath = "/"
title = "Sarte Salon"
version = "1.0.0"
id = "artifacts/sarte-salon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21456

[services.development]
run = "pnpm --filter @workspace/sarte-salon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sarte-salon", "run", "build" ]
publicDir = "artifacts/sarte-salon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21456"
BASE_PATH = "/"
